name: 'Hybrid Workflow - Call and Dispatch'

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Name of the service to process'
        required: true
        type: string
      operation:
        description: 'Operation to perform'
        required: true
        type: choice
        options:
          - 'validate'
          - 'process'
          - 'finalize'
      configuration:
        description: 'Service configuration in JSON format'
        required: false
        type: string
        default: '{}'
    secrets:
      SERVICE_TOKEN:
        description: 'Authentication token for the service'
        required: true
      WEBHOOK_URL:
        description: 'Webhook URL for notifications'
        required: false
    outputs:
      service-status:
        description: 'Final status of the service operation'
        value: ${{ jobs.process-service.outputs.status }}
      processing-time:
        description: 'Time taken to process the service'
        value: ${{ jobs.process-service.outputs.processing-time }}

  workflow_dispatch:
    inputs:
      service-name:
        description: 'Name of the service to process'
        required: true
        type: string
      operation:
        description: 'Operation to perform'
        required: true
        type: choice
        options:
          - 'validate'
          - 'process'
          - 'finalize'
        default: 'validate'
      configuration:
        description: 'Service configuration in JSON format'
        required: false
        type: string
        default: '{}'
      dry-run:
        description: 'Perform a dry run without making changes'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: read
  checks: write
  issues: write
  pull-requests: write

env:
  SERVICE_NAME: ${{ inputs.service-name }}
  OPERATION: ${{ inputs.operation }}

jobs:
  validate-inputs:
    name: 'Validate Service Inputs'
    runs-on: ubuntu-latest
    outputs:
      validation-status: ${{ steps.validate.outputs.status }}
    steps:
      - name: Validate service name
        run: |
          echo "Validating service name: ${{ inputs.service-name }}"
          if [[ -z "${{ inputs.service-name }}" ]]; then
            echo "Error: Service name cannot be empty"
            exit 1
          fi
          
      - name: Validate operation
        run: |
          echo "Validating operation: ${{ inputs.operation }}"
          case "${{ inputs.operation }}" in
            validate|process|finalize)
              echo "✓ Valid operation"
              ;;
            *)
              echo "Error: Invalid operation"
              exit 1
              ;;
          esac
          
      - name: Validate configuration
        id: validate
        run: |
          echo "Validating configuration: ${{ inputs.configuration }}"
          # Basic JSON validation
          echo '${{ inputs.configuration }}' | python3 -m json.tool > /dev/null
          echo "✓ Configuration is valid JSON"
          echo "status=success" >> $GITHUB_OUTPUT

  process-service:
    name: 'Process Service - ${{ inputs.operation }}'
    runs-on: ubuntu-latest
    needs: validate-inputs
    if: ${{ needs.validate-inputs.outputs.validation-status == 'success' }}
    outputs:
      status: ${{ steps.operation.outputs.status }}
      processing-time: ${{ steps.operation.outputs.processing-time }}
    steps:
      - name: Setup service environment
        run: |
          echo "Setting up environment for service: ${{ inputs.service-name }}"
          echo "Operation: ${{ inputs.operation }}"
          
          # Check if this is a dry run (only available in workflow_dispatch)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry-run }}" == "true" ]]; then
            echo "🏃‍♂️ Running in dry-run mode"
            echo "DRY_RUN=true" >> $GITHUB_ENV
          else
            echo "DRY_RUN=false" >> $GITHUB_ENV
          fi
          
      - name: Execute validation operation
        if: ${{ inputs.operation == 'validate' }}
        run: |
          echo "🔍 Validating service ${{ inputs.service-name }}"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY RUN: Would validate service configuration"
          else
            echo "Validating service configuration..."
            echo "✓ Service validation completed"
          fi
          
      - name: Execute processing operation
        if: ${{ inputs.operation == 'process' }}
        run: |
          echo "⚙️ Processing service ${{ inputs.service-name }}"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY RUN: Would process service data"
          else
            echo "Processing service data..."
            echo "✓ Service processing completed"
          fi
          
      - name: Execute finalization operation
        if: ${{ inputs.operation == 'finalize' }}
        run: |
          echo "🏁 Finalizing service ${{ inputs.service-name }}"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY RUN: Would finalize service"
          else
            echo "Finalizing service..."
            echo "✓ Service finalization completed"
          fi
          
      - name: Set operation results
        id: operation
        run: |
          start_time=$(date +%s)
          # Simulate processing time
          sleep 2
          end_time=$(date +%s)
          processing_time=$((end_time - start_time))
          
          echo "status=success" >> $GITHUB_OUTPUT
          echo "processing-time=${processing_time}s" >> $GITHUB_OUTPUT
          
          echo "Operation completed successfully in ${processing_time} seconds"

  notify:
    name: 'Send Notifications'
    runs-on: ubuntu-latest
    needs: [validate-inputs, process-service]
    if: always()
    steps:
      - name: Prepare notification data
        run: |
          echo "Preparing notifications for workflow completion"
          echo "Service: ${{ inputs.service-name }}"
          echo "Operation: ${{ inputs.operation }}"
          echo "Status: ${{ needs.process-service.outputs.status }}"
          echo "Processing time: ${{ needs.process-service.outputs.processing-time }}"
          
      - name: Send webhook notification
        if: ${{ secrets.WEBHOOK_URL != '' }}
        run: |
          echo "Sending webhook notification to configured endpoint"
          echo "Webhook would be sent with operation results"
          
      - name: Update workflow summary
        run: |
          echo "## Service Processing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service Name**: ${{ inputs.service-name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Operation**: ${{ inputs.operation }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ needs.process-service.outputs.status || 'failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Processing Time**: ${{ needs.process-service.outputs.processing-time || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "- **Dry Run**: ${{ inputs.dry-run }}" >> $GITHUB_STEP_SUMMARY
          fi