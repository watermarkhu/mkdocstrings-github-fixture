name: 'Deprecated Action Features'
description: |
  Action demonstrating deprecated and legacy features
  for testing backward compatibility documentation

# Legacy icon and color (should be documented as deprecated)
icon: 'activity'
color: 'red'

inputs:
  legacy-input:
    description: 'Legacy input parameter'
    required: false
  # Testing inputs without descriptions
  undocumented-input:
    required: false
    default: 'undocumented'

outputs:
  legacy-output:
    description: 'Legacy output parameter'
  # Testing outputs without descriptions  
  undocumented-output: {}

runs:
  using: 'composite'
  steps:
    - name: Handle legacy features
      run: |
        echo "Processing legacy input: ${{ inputs.legacy-input }}"
        echo "Processing undocumented input: ${{ inputs.undocumented-input }}"
        echo "legacy-output=legacy-value" >> $GITHUB_OUTPUT
        echo "undocumented-output=undocumented-value" >> $GITHUB_OUTPUT
      shell: bash